name: "PR"

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: "CI"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Lint extension
        run: npm run lint:ext
      - name: Build extension
        run: npm run build:ext
