name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.HELPER_APP_ID }}
          private-key: ${{ secrets.HELPER_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.generate-token.outputs.token }}

  build-release-xpi:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package source for AMO
        run: git archive --format=zip --output=sources.zip HEAD

      - name: Build extension
        run: npm run build:ext

      - name: Attach unsigned XPI to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: web-ext-artifacts/*.xpi

      - name: Built XPI path from manifest
        id: xpi_path
        run: |
          v=$(jq -r .version manifest.json)
          p="web-ext-artifacts/tab_yeet-${v}.xpi"
          test -f "$p"
          echo "path=$p" >> "$GITHUB_OUTPUT"

      - name: Fetch GitHub Release notes for AMO
        id: gh_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"
          delim="REL_NOTES_$(openssl rand -hex 8)"
          {
            echo "body<<${delim}"
            gh api "repos/${{ github.repository }}/releases/tags/${tag}" --jq -r .body
            echo "${delim}"
          } >> "$GITHUB_OUTPUT"

      - name: Sign with AMO
        id: amo_sign
        uses: kewisch/action-web-ext@v1
        with:
          cmd: sign
          source: ${{ steps.xpi_path.outputs.path }}
          sourceCode: sources.zip
          channel: listed
          releaseNotes: ${{ steps.gh_release.outputs.body }}
          license: GPL-3.0-or-later
          apiKey: ${{ secrets.AMO_SIGN_KEY }}
          apiSecret: ${{ secrets.AMO_SIGN_SECRET }}
          timeout: 900000

      - name: Attach signed XPI to GitHub Release
        if: ${{ steps.amo_sign.outputs.target != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ steps.amo_sign.outputs.target }}
