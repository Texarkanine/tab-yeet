name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.HELPER_APP_ID }}
          private-key: ${{ secrets.HELPER_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.generate-token.outputs.token }}

  build-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build:ext

      - name: Attach release artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            web-ext-artifacts/*.xpi
            web-ext-artifacts/*-chrome.zip

      - name: Stage AMO signing bundle
        run: |
          mkdir -p amo-submit
          p=$(jq -r '
            def safe: ascii_downcase | gsub("[^a-z0-9.-]+"; "_");
            "web-ext-artifacts/" + (.name | safe) + "-" + (.version | safe) + ".xpi"
          ' manifest.json)
          test -f "$p"
          cp "$p" amo-submit/unsigned.xpi
          cp LICENSE amo-submit/LICENSE

      - name: Upload AMO signing bundle
        uses: actions/upload-artifact@v7
        with:
          name: amo-submit
          path: amo-submit

      - name: Stage CWS upload bundle
        run: |
          mkdir -p cws-submit
          cp web-ext-artifacts/*-chrome.zip cws-submit/extension.zip

      - name: Upload CWS bundle
        uses: actions/upload-artifact@v7
        with:
          name: cws-submit
          path: cws-submit

  amo-sign-and-attach:
    name: Sign with AMO and attach signed XPI
    needs:
      - release-please
      - build-release
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download AMO signing bundle
        uses: actions/download-artifact@v8
        with:
          name: amo-submit
          path: amo-submit

      - name: Fetch GitHub Release notes for AMO
        id: gh_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"
          delim="REL_NOTES_$(openssl rand -hex 8)"
          body=$(gh api "repos/${{ github.repository }}/releases/tags/${tag}" | jq -r '.body // empty')
          {
            echo "body<<${delim}"
            echo "$body"
            echo "${delim}"
          } >> "$GITHUB_OUTPUT"

      # AMO version.license only allows listed slugs (no GPL-3.0-or-later). Use custom_license
      # via --amo-metadata so the listing shows SPDX GPL-3.0-or-later + full LICENSE text.
      # Do not pass action `license:` — kewisch maps GPL-3.0-or-later to version.license and AMO 400s.
      # Listed versions require add-on categories (fixed slugs per app); see AMO API "Create" docs.
      - name: Write AMO metadata (GPL-3.0-or-later custom_license + categories)
        run: |
          jq -n --rawfile text amo-submit/LICENSE '
            {
              default_locale: "en-US",
              categories: {
                firefox: ["tabs"]
              },
              version: {
                custom_license: {
                  name: {"en-US": "GPL-3.0-or-later"},
                  text: {"en-US": $text}
                }
              }
            }
          ' > amo-submit/amo-metadata.json

      - name: Sign with AMO
        id: amo_sign
        uses: kewisch/action-web-ext@v1
        with:
          cmd: sign
          source: amo-submit/unsigned.xpi
          channel: listed
          releaseNotes: ${{ steps.gh_release.outputs.body }}
          metaDataFile: amo-submit/amo-metadata.json
          apiKey: ${{ secrets.AMO_SIGN_KEY }}
          apiSecret: ${{ secrets.AMO_SIGN_SECRET }}
          timeout: 900000

      - name: Attach signed XPI to GitHub Release
        if: ${{ steps.amo_sign.outputs.target != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ steps.amo_sign.outputs.target }}

  cws-publish:
    name: Publish to Chrome Web Store
    needs:
      - release-please
      - build-release
    if: ${{ needs.release-please.outputs.release_created == 'true' && secrets.CWS_CLIENT_ID != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download CWS bundle
        uses: actions/download-artifact@v8
        with:
          name: cws-submit
          path: cws-submit

      - name: Exchange refresh token for access token
        id: auth
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${CWS_CLIENT_ID}" \
            -d "client_secret=${CWS_CLIENT_SECRET}" \
            -d "refresh_token=${CWS_REFRESH_TOKEN}" \
            -d "grant_type=refresh_token")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Token exchange failed with HTTP ${http_code}"
            echo "$body" | jq .
            exit 1
          fi
          token=$(echo "$body" | jq -r '.access_token // empty')
          if [ -z "$token" ]; then
            echo "::error::Token response missing access_token"
            echo "$body" | jq .
            exit 1
          fi
          echo "::add-mask::${token}"
          echo "token=${token}" >> "$GITHUB_OUTPUT"

      - name: Upload zip to Chrome Web Store
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X PUT \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${CWS_EXTENSION_ID}" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "x-goog-api-version: 2" \
            -T cws-submit/extension.zip)
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "$body" | jq .
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::CWS upload failed with HTTP ${http_code}"
            exit 1
          fi
          upload_status=$(echo "$body" | jq -r '.uploadState // empty')
          if [ "$upload_status" != "SUCCESS" ]; then
            echo "::error::CWS upload state: ${upload_status}"
            exit 1
          fi

      - name: Publish to Chrome Web Store
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${CWS_EXTENSION_ID}/publish" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "$body" | jq .
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::CWS publish failed with HTTP ${http_code}"
            exit 1
          fi
          publish_status=$(echo "$body" | jq -r '.status[0] // empty')
          if [ "$publish_status" != "OK" ]; then
            echo "::warning::CWS publish status: ${publish_status} (review may be pending)"
          fi
