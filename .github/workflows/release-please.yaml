name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.HELPER_APP_ID }}
          private-key: ${{ secrets.HELPER_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.generate-token.outputs.token }}

  build-release-xpi:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package source for AMO
        run: git archive --format=zip --output=sources.zip HEAD

      - name: Build extension
        run: npm run build:ext

      - name: Attach unsigned XPI to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: web-ext-artifacts/*.xpi

      - name: Stage AMO signing bundle
        run: |
          mkdir -p amo-submit
          p=$(jq -r '
            def safe: ascii_downcase | gsub("[^a-z0-9.-]+"; "_");
            "web-ext-artifacts/" + (.name | safe) + "-" + (.version | safe) + ".xpi"
          ' manifest.json)
          test -f "$p"
          cp "$p" amo-submit/unsigned.xpi
          cp sources.zip amo-submit/sources.zip
          cp LICENSE amo-submit/LICENSE

      - name: Upload AMO signing bundle
        uses: actions/upload-artifact@v4
        with:
          name: amo-submit
          path: amo-submit

  amo-sign-and-attach:
    name: Sign with AMO and attach signed XPI
    needs:
      - release-please
      - build-release-xpi
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download AMO signing bundle
        uses: actions/download-artifact@v4
        with:
          name: amo-submit
          path: amo-submit

      - name: Fetch GitHub Release notes for AMO
        id: gh_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"
          delim="REL_NOTES_$(openssl rand -hex 8)"
          body=$(gh api "repos/${{ github.repository }}/releases/tags/${tag}" | jq -r '.body // empty')
          {
            echo "body<<${delim}"
            echo "$body"
            echo "${delim}"
          } >> "$GITHUB_OUTPUT"

      - name: Sign with AMO
        id: amo_sign
        uses: kewisch/action-web-ext@v1
        with:
          cmd: sign
          source: amo-submit/unsigned.xpi
          sourceCode: amo-submit/sources.zip
          channel: listed
          releaseNotes: ${{ steps.gh_release.outputs.body }}
          # AMO API allows only listed slugs; GPL-3.0-or-later is not one of them.
          # See https://mozilla.github.io/addons-server/topics/api/licenses.html
          # kewisch/action-web-ext uses custom_license when license is not in its KNOWN_LICENSES.
          license: GPL-3.0-only
          licenseFile: amo-submit/LICENSE
          apiKey: ${{ secrets.AMO_SIGN_KEY }}
          apiSecret: ${{ secrets.AMO_SIGN_SECRET }}
          timeout: 900000

      - name: Attach signed XPI to GitHub Release
        if: ${{ steps.amo_sign.outputs.target != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ steps.amo_sign.outputs.target }}
